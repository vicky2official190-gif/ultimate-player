<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<link rel="icon" href="data:,">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
overflow-x:hidden;
}

/* Sticky Player */

.sticky-player{
position:sticky;
top:0;
z-index:9999;
background:#000;
width:100%;
}

.video-container{
position:relative;
width:100%;
height:50vh;
background:black;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

.pdf-viewer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
display:none;
background:white;
z-index:2;
}

.video-title{
padding:10px;
background:#111;
font-size:14px;
}

/* Controls */

.controls{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
padding:10px;
transition:opacity .3s;
z-index:3;
opacity:1;
}

.controls.hide{
opacity:0;
}

.progress-container{
width:100%;
height:4px;
background:#444;
cursor:pointer;
}

.progress{
height:100%;
width:0%;
background:red;
}

.time{
text-align:center;
font-size:12px;
margin:5px 0;
}

.bottom-controls{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.bottom-controls button,
.bottom-controls select{
background:#111;
border:1px solid #333;
color:white;
padding:6px 10px;
cursor:pointer;
}

/* Header */

.header{
display:flex;
gap:10px;
padding:10px;
background:#111;
position:sticky;
top:calc(50vh + 40px);
z-index:9998;
}

.btn{
background:#222;
padding:6px 12px;
cursor:pointer;
}

.search{
margin-left:auto;
}

.search input{
background:#222;
border:1px solid #444;
color:white;
padding:5px;
}

/* Playlist */

.item{
padding:12px;
border-bottom:1px solid #333;
cursor:pointer;
}

@media(max-width:768px){

.video-container{
height:30vh;
}

.header{
top:calc(30vh + 40px);
}

}

</style>

</head>

<body>

<div class="sticky-player">

<div class="video-container" id="videoContainer">

<video id="video" playsinline webkit-playsinline></video>
<iframe id="pdfViewer" class="pdf-viewer"></iframe>

<div class="controls" id="controls">

<div class="progress-container" id="progressContainer">
<div class="progress" id="progress"></div>
</div>

<div class="time" id="timeDisplay">0:00 / 0:00</div>

<div class="bottom-controls">

<button onclick="rewind()">⏪ 10s</button>
<button onclick="stopVideo()">⏹ Stop</button>
<button onclick="forward()">⏩ 10s</button>

<select onchange="changeSpeed(this.value)">
<option>0.5</option>
<option>0.75</option>
<option selected>1</option>
<option>1.25</option>
<option>1.5</option>
<option>1.75</option>
<option>2</option>
</select>

<select class="quality" onchange="changeQuality(this.value)">
<option value="-1">Auto</option>
</select>

<button onclick="toggleFullscreen()">⛶</button>

</div>

</div>

</div>

<div class="video-title" id="videoTitle">
No video playing
</div>

<div class="header">

<div class="btn" onclick="loadList('videos')">Videos</div>
<div class="btn" onclick="loadList('arithmetic')">Arithmetic</div>

<div class="search">
<input id="search" placeholder="Search" onkeyup="searchVideo()">
</div>

</div>

</div>

<div id="playlist"></div>

<script>

/* (Your entire previous working JS remains unchanged) */

</script>

</body>
</html>
