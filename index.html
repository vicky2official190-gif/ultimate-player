<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
}

video{
width:100%;
height:50vh;
background:black;
}

.header{
display:flex;
gap:10px;
padding:10px;
background:#111;
}

.btn{
padding:8px 12px;
background:#222;
border-radius:5px;
cursor:pointer;
}

.btn:hover{
background:#444;
}

#playlist{
padding:10px;
}

.item{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.item:hover{
background:#222;
}

</style>

</head>

<body>

<video id="video" controls></video>

<div class="header">
<div class="btn" onclick="loadList('videos')">Videos</div>
<div class="btn" onclick="loadList('arithmetic')">Arithmetic</div>
</div>

<div id="playlist"></div>

<script>

const video = document.getElementById('video');
const playlist = document.getElementById('playlist');

function proxy(url){
return "https://ultimate-player.vicky2official1-90.workers.dev/proxy?url=" + encodeURIComponent(url);
}

function loadList(type){

playlist.innerHTML="Loading...";

let url="";

if(type==="videos"){
url="https://ultimate-player.vicky2official1-90.workers.dev/videos.txt";
}

if(type==="arithmetic"){
url="https://ultimate-player.vicky2official1-90.workers.dev/arithmetic.txt";
}

fetch(url)
.then(res => res.text())
.then(data => {

playlist.innerHTML="";

const lines=data.split('\n');

lines.forEach(line=>{

if(line.includes("http")){

const parts=line.split(":");
const title=parts[0];
const videoUrl=parts.slice(1).join(":").trim();

const div=document.createElement("div");
div.className="item";
div.textContent=title;

div.onclick=()=>{
playVideo(proxy(videoUrl));
};

playlist.appendChild(div);

}

});

});

}

function playVideo(url){

if(Hls.isSupported()){
const hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
}else{
video.src=url;
}

}

loadList("videos");

</script>

</body>
</html>
