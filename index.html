<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
}

.sticky-player{
position:sticky;
top:0;
z-index:999;
background:#000;
}

.video-container{
position:relative;
width:100%;
height:50vh;
background:black;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

.pdf-viewer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
display:none;
background:white;
z-index:2;
}

.video-title{
padding:10px;
background:#111;
font-size:14px;
}

.controls{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
padding:10px;
transition:.3s;
z-index:3;
}

.controls.hide{
opacity:0;
}

.progress-container{
width:100%;
height:4px;
background:#444;
cursor:pointer;
}

.progress{
height:100%;
width:0%;
background:red;
}

.time{
text-align:center;
font-size:12px;
margin:5px 0;
}

.bottom-controls{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.bottom-controls button,
.bottom-controls select{
background:#111;
border:1px solid #333;
color:white;
padding:6px 10px;
cursor:pointer;
}

.header{
display:flex;
gap:10px;
padding:10px;
background:#111;
}

.btn{
background:#222;
padding:6px 12px;
cursor:pointer;
}

.search{
margin-left:auto;
}

.search input{
background:#222;
border:1px solid #444;
color:white;
padding:5px;
}

.item{
padding:12px;
border-bottom:1px solid #333;
cursor:pointer;
}

@media(max-width:768px){
.video-container{
height:30vh;
}
}

</style>

</head>

<body>

<div class="sticky-player">

<div class="video-container" id="videoContainer">

<video id="video" playsinline></video>

<iframe id="pdfViewer" class="pdf-viewer"></iframe>

<div class="controls" id="controls">

<div class="progress-container" id="progressContainer">
<div class="progress" id="progress"></div>
</div>

<div class="time" id="timeDisplay">0:00 / 0:00</div>

<div class="bottom-controls">

<button onclick="rewind()">⏪ 10s</button>
<button onclick="stopVideo()">⏹ Stop</button>
<button onclick="forward()">⏩ 10s</button>

<select onchange="changeSpeed(this.value)">
<option>0.5</option>
<option>0.75</option>
<option selected>1</option>
<option>1.25</option>
<option>1.5</option>
<option>1.75</option>
<option>2</option>
</select>

<select class="quality" onchange="changeQuality(this.value)">
<option value="-1">Auto</option>
</select>

<button onclick="toggleFullscreen()">⛶</button>

</div>

</div>

</div>

<div class="video-title" id="videoTitle">
No video playing
</div>

<div class="header">

<div class="btn" onclick="loadList('videos')">Videos</div>
<div class="btn" onclick="loadList('arithmetic')">Arithmetic</div>

<div class="search">
<input id="search" placeholder="Search" onkeyup="searchVideo()">
</div>

</div>

</div>

<div id="playlist"></div>

<script>

const video=document.getElementById("video");
const pdfViewer=document.getElementById("pdfViewer");
const progress=document.getElementById("progress");
const progressContainer=document.getElementById("progressContainer");
const timeDisplay=document.getElementById("timeDisplay");
const controls=document.getElementById("controls");
const videoTitle=document.getElementById("videoTitle");

let currentHls;
let playbackSpeed=1;
let hideTimer;
let currentType="videos";
let allItems=[];
let currentVideoUrl="";

/* double tap */

let lastTap=0;

video.addEventListener("click",handleDoubleTap);
video.addEventListener("touchend",handleDoubleTap);

function handleDoubleTap(e){

const now=new Date().getTime();
const diff=now-lastTap;

if(diff<300){

const rect=video.getBoundingClientRect();
const x=e.clientX || (e.changedTouches && e.changedTouches[0].clientX);

if(x < rect.left + rect.width/2){
video.currentTime-=10;
}else{
video.currentTime+=10;
}

}

lastTap=now;

}

/* proxy */

function proxy(url){
return "https://ultimate-player.vicky2official1-90.workers.dev/proxy?url="+encodeURIComponent(url);
}

/* resume */

video.addEventListener("timeupdate",()=>{
if(currentVideoUrl){
localStorage.setItem("progress_"+currentVideoUrl,video.currentTime);
}
});

/* auto hide */

function showControls(){
controls.classList.remove("hide");
clearTimeout(hideTimer);
hideTimer=setTimeout(()=>{
controls.classList.add("hide");
},3000);
}

document.getElementById("videoContainer").addEventListener("mousemove",showControls);
document.getElementById("videoContainer").addEventListener("touchstart",showControls);

/* format */

function format(t){
if(!t) return "0:00";
let m=Math.floor(t/60);
let s=Math.floor(t%60);
return m+":"+(s<10?"0":"")+s;
}

/* progress */

video.addEventListener("timeupdate",()=>{
const percent=(video.currentTime/video.duration)*100;
progress.style.width=percent+"%";
timeDisplay.innerText=format(video.currentTime)+" / "+format(video.duration);
});

/* seek */

progressContainer.addEventListener("click",(e)=>{
const width=progressContainer.clientWidth;
video.currentTime=(e.offsetX/width)*video.duration;
});

/* skip */

function rewind(){ video.currentTime-=10 }
function forward(){ video.currentTime+=10 }

/* stop */

function stopVideo(){
video.pause();
video.currentTime=0;
}

/* speed */

function changeSpeed(speed){
playbackSpeed=parseFloat(speed);
video.playbackRate=playbackSpeed;
}

/* fullscreen */

function toggleFullscreen(){
const container=document.getElementById("videoContainer");
if(!document.fullscreenElement){
container.requestFullscreen();
if(screen.orientation){
screen.orientation.lock("landscape").catch(()=>{});
}
}else{
document.exitFullscreen();
}
}

/* quality */

function changeQuality(level){
if(currentHls){
currentHls.currentLevel=level;
}
}

function setupQuality(){
const quality=document.querySelector(".quality");
quality.innerHTML='<option value="-1">Auto</option>';
currentHls.levels.forEach((level,index)=>{
const option=document.createElement("option");
option.value=index;
option.text=level.height+"p";
quality.appendChild(option);
});
}

/* play */

function play(url,title){

currentVideoUrl=url;

pdfViewer.style.display="none";
video.style.display="block";

videoTitle.innerText=title;

if(currentHls) currentHls.destroy();

currentHls=new Hls();

currentHls.loadSource(url);
currentHls.attachMedia(video);

currentHls.on(Hls.Events.MANIFEST_PARSED,()=>{

setupQuality();

let saved=localStorage.getItem("progress_"+url);
if(saved) video.currentTime=saved;

video.playbackRate=playbackSpeed;

video.play();

});

}

/* PDF viewer */

function openPDF(url,title){
video.pause();
video.style.display="none";
pdfViewer.style.display="block";
videoTitle.innerText=title;
pdfViewer.src=proxy(url);
}

/* load */

function loadList(type){

currentType=type;

let url= type==="videos"
? "https://ultimate-player.vicky2official1-90.workers.dev/videos.txt"
: "https://ultimate-player.vicky2official1-90.workers.dev/arithmetic.txt";

fetch(url).then(r=>r.text()).then(data=>{

allItems=[];

data.split("\n").forEach(line=>{

if(line.includes("http")){

const parts=line.split(":");

allItems.push({
title:parts[0],
url:parts.slice(1).join(":").trim()
});

}

});

render(allItems);

});

}

/* render */

function render(list){

const playlist=document.getElementById("playlist");

playlist.innerHTML="";

list.forEach(item=>{

const div=document.createElement("div");

div.className="item";
div.textContent=item.title;

if(item.url.endsWith(".pdf")){
div.onclick=()=>openPDF(item.url,item.title);
}else{
div.onclick=()=>play(proxy(item.url),item.title);
}

playlist.appendChild(div);

});

}

/* search */

function searchVideo(){
const q=document.getElementById("search").value.toLowerCase();
render(allItems.filter(i=>i.title.toLowerCase().includes(q)));
}

loadList("videos");

</script>

</body>
</html>
