<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<link rel="icon" href="data:,">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
overflow-x:hidden;
}

.sticky-player{
position:sticky;
top:0;
z-index:9999;
background:#000;
}

.video-container{
position:relative;
width:100%;
height:50vh;
background:black;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

.pdf-viewer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
display:none;
background:white;
z-index:2;
}

.tap-indicator{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:28px;
background:rgba(0,0,0,.5);
padding:20px;
border-radius:50%;
opacity:0;
pointer-events:none;
transition:.3s;
}

.tap-left{ left:20%; }
.tap-right{ right:20%; }

.tap-indicator.show{ opacity:1; }

.video-title{
padding:10px;
background:#111;
font-size:14px;
}

.controls{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
padding:10px;
transition:.3s;
z-index:3;
}

.controls.hide{
opacity:0;
pointer-events:none;
}

.progress-container{
width:100%;
height:6px;
background:#333;
cursor:pointer;
}

.progress{
height:100%;
width:0%;
background:red;
transition:width .1s linear;
}

.time{
text-align:center;
font-size:12px;
margin:5px 0;
}

.bottom-controls{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.bottom-controls button,
.bottom-controls select{
background:#111;
border:1px solid #333;
color:white;
padding:6px 10px;
cursor:pointer;
}

.header{
display:flex;
gap:10px;
padding:10px;
background:#111;
position:sticky;
top:0;
z-index:9998;
}

.btn{
background:#222;
padding:6px 12px;
cursor:pointer;
}

.search{ margin-left:auto; }

.search input{
background:#222;
border:1px solid #444;
color:white;
padding:5px;
}

.item{
padding:12px;
border-bottom:1px solid #333;
cursor:pointer;
}

.item.active{
background:#222;
border-left:4px solid red;
}

@media(max-width:768px){
.video-container{ height:30vh; }
}

</style>
</head>

<body>

<div class="sticky-player">

<div class="video-container" id="videoContainer">

<video id="video" preload="auto" playsinline webkit-playsinline></video>
<iframe id="pdfViewer" class="pdf-viewer"></iframe>

<div class="tap-indicator tap-left" id="tapLeft">⏪ 10s</div>
<div class="tap-indicator tap-right" id="tapRight">⏩ 10s</div>

<div class="controls" id="controls">

<div class="progress-container" id="progressContainer">
<div class="progress" id="progress"></div>
</div>

<div class="time" id="timeDisplay">0:00 / 0:00</div>

<div class="bottom-controls">
<button onclick="rewind()">⏪ 10s</button>
<button onclick="stopVideo()">⏯</button>
<button onclick="forward()">⏩ 10s</button>

<select onchange="changeSpeed(this.value)">
<option>0.5</option>
<option>0.75</option>
<option selected>1</option>
<option>1.25</option>
<option>1.5</option>
<option>1.75</option>
<option>2</option>
</select>

<button onclick="toggleFullscreen()">⛶</button>

</div>

</div>
</div>

<div class="video-title" id="videoTitle">
No Lecture Playing
</div>

</div>

<div id="playlist"></div>

<script>

const video=document.getElementById("video");
const progress=document.getElementById("progress");
const progressContainer=document.getElementById("progressContainer");
const timeDisplay=document.getElementById("timeDisplay");
const controls=document.getElementById("controls");
const videoContainer=document.getElementById("videoContainer");

const tapLeft=document.getElementById("tapLeft");
const tapRight=document.getElementById("tapRight");

/* Auto hide controls */

let hideTimer;

function showControls(){

controls.classList.remove("hide");

clearTimeout(hideTimer);

hideTimer=setTimeout(()=>{
controls.classList.add("hide");
},3000);

}

videoContainer.addEventListener("mousemove",showControls);
videoContainer.addEventListener("pointerdown",showControls);

/* Double tap skip */

let lastTap=0;

video.addEventListener("pointerup",(e)=>{

const now=Date.now();

if(now-lastTap<300){

const rect=video.getBoundingClientRect();
const x=e.clientX;

if(x < rect.left + rect.width/2){

video.currentTime-=10;
showTapLeft();

}else{

video.currentTime+=10;
showTapRight();

}

updateProgress();

lastTap=0;

}else{
lastTap=now;
}

});

function showTapLeft(){
tapLeft.classList.add("show");
setTimeout(()=>tapLeft.classList.remove("show"),500);
}

function showTapRight(){
tapRight.classList.add("show");
setTimeout(()=>tapRight.classList.remove("show"),500);
}

/* progress update */

function updateProgress(){

if(video.duration){

const percent=(video.currentTime/video.duration)*100;
progress.style.width=percent+"%";

timeDisplay.innerText=
format(video.currentTime)+" / "+format(video.duration);

}

}

/* time update */

video.addEventListener("timeupdate",updateProgress);

/* seek */

progressContainer.addEventListener("click",(e)=>{

const width=progressContainer.clientWidth;
const pos=e.offsetX;

video.currentTime=(pos/width)*video.duration;

updateProgress();

});

/* skip buttons */

function rewind(){
video.currentTime-=10;
updateProgress();
}

function forward(){
video.currentTime+=10;
updateProgress();
}

/* play pause */

function stopVideo(){
video.paused?video.play():video.pause();
}

/* format */

function format(t){
if(!t) return "0:00";
let m=Math.floor(t/60);
let s=Math.floor(t%60);
return m+":"+(s<10?"0":"")+s;
}

/* fullscreen */

function toggleFullscreen(){

if(!document.fullscreenElement){

videoContainer.requestFullscreen().then(()=>{

if(screen.orientation){
screen.orientation.lock("landscape").catch(()=>{});
}

});

}else{

document.exitFullscreen();

if(screen.orientation){
screen.orientation.unlock();
}

}

}

</script>

</body>
</html>
