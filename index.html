<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
}

/* sticky */

.sticky{
position:sticky;
top:0;
z-index:999;
background:#000;
}

/* video */

.video-container{
position:relative;
background:black;
width:100%;
height:50vh;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

/* progress bar */

.progress-container{
width:100%;
height:5px;
background:#333;
cursor:pointer;
}

.progress{
height:100%;
width:0%;
background:red;
}

/* fullscreen */

.video-container:fullscreen{
height:100vh;
}

.video-container:fullscreen video{
height:100vh;
}

/* controls */

.controls{
display:flex;
justify-content:center;
gap:10px;
background:#111;
padding:10px;
}

.controls button,
.controls select{
background:#222;
color:white;
border:1px solid #444;
padding:6px 12px;
cursor:pointer;
border-radius:6px;
}

/* header */

.header{
display:flex;
gap:10px;
padding:10px;
background:#111;
align-items:center;
}

.btn{
padding:8px 12px;
background:#222;
border-radius:5px;
cursor:pointer;
}

.search{
margin-left:auto;
}

.search input{
background:#222;
border:1px solid #444;
color:white;
padding:7px 10px;
border-radius:6px;
}

/* playlist */

#playlist{
padding:10px;
}

.item{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

/* mobile */

@media(max-width:768px){

.video-container{
height:35vh;
}

}

@media (orientation: landscape){

.video-container{
height:100vh;
}

}

</style>

</head>

<body>

<div class="sticky">

<div class="video-container" id="videoContainer">

<video id="video" playsinline webkit-playsinline></video>

<div class="progress-container" id="progressContainer">
<div class="progress" id="progress"></div>
</div>

</div>

<div class="controls">

<button onclick="rewind()">⏪ 10s</button>
<button onclick="forward()">⏩ 10s</button>

<select onchange="changeSpeed(this.value)">
<option value="0.5">0.5x</option>
<option value="0.75">0.75x</option>
<option value="1" selected>1x</option>
<option value="1.25">1.25x</option>
<option value="1.5">1.5x</option>
<option value="1.75">1.75x</option>
<option value="2">2x</option>
</select>

<button onclick="toggleFullscreen()">⛶</button>

</div>

<div class="header">
<div class="btn" onclick="loadList('videos')">Videos</div>
<div class="btn" onclick="loadList('arithmetic')">Arithmetic</div>

<div class="search">
<input type="text" id="search" placeholder="Search..." onkeyup="searchVideo()">
</div>

</div>

</div>

<div id="playlist"></div>

<script>

const video=document.getElementById('video');
const playlist=document.getElementById('playlist');
const progress=document.getElementById('progress');
const progressContainer=document.getElementById('progressContainer');

let currentHls;
let allItems=[];

function proxy(url){
return "https://ultimate-player.vicky2official1-90.workers.dev/proxy?url="+encodeURIComponent(url);
}

function loadList(type){

playlist.innerHTML="Loading...";
allItems=[];

let url= type==="videos"
? "https://ultimate-player.vicky2official1-90.workers.dev/videos.txt"
: "https://ultimate-player.vicky2official1-90.workers.dev/arithmetic.txt";

fetch(url)
.then(res=>res.text())
.then(data=>{

playlist.innerHTML="";
const lines=data.split('\n');

lines.forEach(line=>{

if(line.includes("http")){

const parts=line.split(":");
const title=parts[0];
const videoUrl=parts.slice(1).join(":").trim();

allItems.push({title,videoUrl});
renderList(allItems);

}

});

});

}

function renderList(list){

playlist.innerHTML="";

list.forEach(item=>{

const div=document.createElement("div");
div.className="item";
div.textContent=item.title;

div.onclick=()=>{
playVideo(proxy(item.videoUrl));
};

playlist.appendChild(div);

});

}

function searchVideo(){

const search=document.getElementById("search").value.toLowerCase();

const filtered=allItems.filter(item =>
item.title.toLowerCase().includes(search)
);

renderList(filtered);

}

function playVideo(url){

if(currentHls) currentHls.destroy();

if(Hls.isSupported()){
currentHls=new Hls();
currentHls.loadSource(url);
currentHls.attachMedia(video);

currentHls.on(Hls.Events.MANIFEST_PARSED,()=>video.play());

}else{
video.src=url;
video.play();
}

}

/* progress bar */

video.addEventListener('timeupdate',()=>{
const percent=(video.currentTime/video.duration)*100;
progress.style.width=percent+"%";
});

progressContainer.addEventListener('click',(e)=>{

const width=progressContainer.clientWidth;
const clickX=e.offsetX;
const duration=video.duration;

video.currentTime=(clickX/width)*duration;

});

/* controls */

function rewind(){ video.currentTime-=10 }
function forward(){ video.currentTime+=10 }

function changeSpeed(speed){
video.playbackRate=speed;
}

function toggleFullscreen(){

const container=document.getElementById("videoContainer");

if(!document.fullscreenElement){
container.requestFullscreen();
}else{
document.exitFullscreen();
}

}

/* double click pause */

video.addEventListener("dblclick",togglePlay);

function togglePlay(){

if(video.paused){
video.play();
}else{
video.pause();
}

}

/* space pause */

document.addEventListener("keydown",e=>{

if(e.code==="Space"){
e.preventDefault();
togglePlay();
}

if(e.key==="ArrowRight") forward();
if(e.key==="ArrowLeft") rewind();

});

loadList("videos");

</script>

</body>
</html>
