<script>

const video=document.getElementById("video");
const progress=document.getElementById("progress");
const progressContainer=document.getElementById("progressContainer");

let currentHls;
let playbackSpeed=1;
let speedMemory={};

/* format time */

function formatTime(sec){

if(!sec) return "0:00";

let m=Math.floor(sec/60);
let s=Math.floor(sec%60);

return m+":"+(s<10?"0":"")+s;

}

/* progress */

video.addEventListener("timeupdate",()=>{

const percent=(video.currentTime/video.duration)*100;
progress.style.width=percent+"%";

document.getElementById("timeDisplay").innerText=
formatTime(video.currentTime)+" / "+formatTime(video.duration);

});

/* seek */

progressContainer.addEventListener("click",(e)=>{

const width=progressContainer.clientWidth;
video.currentTime=(e.offsetX/width)*video.duration;

});

/* speed */

function changeSpeed(speed){

playbackSpeed=parseFloat(speed);

video.playbackRate=playbackSpeed;

speedAnimation(speed);

}

/* speed animation */

function speedAnimation(speed){

const div=document.createElement("div");

div.innerText=speed+"x";
div.style.position="absolute";
div.style.top="50%";
div.style.left="50%";
div.style.transform="translate(-50%,-50%)";
div.style.background="rgba(0,0,0,0.7)";
div.style.padding="20px";
div.style.fontSize="30px";
div.style.borderRadius="10px";

document.body.appendChild(div);

setTimeout(()=>div.remove(),800);

}

/* skip */

function rewind(){ video.currentTime-=10 }
function forward(){ video.currentTime+=10 }

/* fullscreen */

function toggleFullscreen(){

const container=document.getElementById("videoContainer");

if(!document.fullscreenElement){

container.requestFullscreen();

if(screen.orientation){
screen.orientation.lock("landscape").catch(()=>{});
}

}else{

document.exitFullscreen();

if(screen.orientation){
screen.orientation.unlock();
}

}

}

/* quality */

function changeQuality(level){

if(currentHls){
currentHls.currentLevel=level;
}

}

function setupQuality(){

const quality=document.querySelector(".quality");

quality.innerHTML='<option value="-1">Auto</option>';

currentHls.levels.forEach((level,index)=>{

const option=document.createElement("option");

option.value=index;
option.text=level.height+"p";

quality.appendChild(option);

});

}

/* play */

function play(url){

if(currentHls) currentHls.destroy();

if(speedMemory[url]){
playbackSpeed=speedMemory[url];
}

if(Hls.isSupported()){

currentHls=new Hls();

currentHls.loadSource(url);
currentHls.attachMedia(video);

currentHls.on(Hls.Events.MANIFEST_PARSED,()=>{

video.playbackRate=playbackSpeed;

setupQuality();
video.play();

});

}else{

video.src=url;

video.onloadedmetadata=()=>{
video.playbackRate=playbackSpeed;
};

video.play();

}

}

/* remember speed */

video.addEventListener("ratechange",()=>{

if(video.src){
speedMemory[video.src]=video.playbackRate;
}

});

/* playlist */

let allItems=[];
const playlist=document.getElementById("playlist");

function proxy(url){
return "https://ultimate-player.vicky2official1-90.workers.dev/proxy?url="+encodeURIComponent(url);
}

function loadList(type){

let url= type==="videos"
? "https://ultimate-player.vicky2official1-90.workers.dev/videos.txt"
: "https://ultimate-player.vicky2official1-90.workers.dev/arithmetic.txt";

fetch(url).then(r=>r.text()).then(data=>{

allItems=[];

data.split("\n").forEach(line=>{

if(line.includes("http")){

const parts=line.split(":");

allItems.push({
title:parts[0],
url:parts.slice(1).join(":").trim()
});

}

});

render(allItems);

});

}

function render(list){

playlist.innerHTML="";

list.forEach(item=>{

const div=document.createElement("div");

div.className="item";
div.textContent=item.title;

div.onclick=()=>play(proxy(item.url));

playlist.appendChild(div);

});

}

function searchVideo(){

const q=document.getElementById("search").value.toLowerCase();

render(allItems.filter(i=>i.title.toLowerCase().includes(q)));

}

loadList("videos");

/* keyboard */

document.addEventListener("keydown",(e)=>{

if(e.code==="Space"){
e.preventDefault();
video.paused?video.play():video.pause();
}

if(e.key==="ArrowRight") forward();
if(e.key==="ArrowLeft") rewind();

});

/* double click */

video.addEventListener("dblclick",()=>{
video.paused?video.play():video.pause();
});

</script>
