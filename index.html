<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:#111;
display:flex;
flex-direction:column;
}

.logo{
padding:12px;
background:#000;
}

.topbar{
display:flex;
gap:5px;
padding:10px;
background:#111;
}

#playlist{
flex:1;
overflow:auto;
}

.item{
padding:12px;
border-bottom:1px solid #222;
cursor:pointer;
}

.active{
background:#333;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

#playerContainer{
flex:1;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

/* Controls */

.controls{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
padding:8px 10px;
background:rgba(0,0,0,0.6);
border-radius:12px;
white-space:nowrap;
}

.controls button,
.controls select{
padding:6px 8px;
background:#111;
color:white;
border:1px solid #333;
}

/* Mobile */

@media(max-width:768px){

.container{
flex-direction:column;
height:100vh;
}

.main{
height:220px;
flex:none;
}

.sidebar{
height:calc(100vh - 220px);
}

}

</style>

</head>

<body>

<div class="container">

<div class="main">

<div id="playerContainer">

<video id="video" controls playsinline></video>

<div class="controls">

<button onclick="prev()">⏮</button>
<button onclick="skip(-10)">⏪</button>
<button onclick="skip(10)">⏩</button>
<button onclick="next()">⏭</button>

<select onchange="speed(this.value)">
<option value="1">1x</option>
<option value="1.25">1.25x</option>
<option value="1.5">1.5x</option>
<option value="1.75">1.75x</option>
<option value="2">2x</option>
</select>

<select id="quality" onchange="setQuality(this.value)">
<option value="-1">Auto</option>
</select>

<button onclick="toggleFull()">⛶</button>

</div>

</div>

</div>

<div class="sidebar">

<div class="logo">Ultimate Player</div>

<div class="topbar">

<select onchange="loadTxt(this.value)">
<option value="videos.txt">Videos</option>
<option value="arithmetic.txt">Arithmetic</option>
</select>

<input id="search" placeholder="Search" onkeyup="searchVideo()" style="flex:1">

</div>

<div id="playlist"></div>

</div>

</div>

<script>

let list=[]
let index=0
let hls
let preloadHls

const video=document.getElementById("video")

loadTxt("videos.txt")

function loadTxt(file){

fetch(file)
.then(r=>r.text())
.then(data=>{

list=data.split("\n").filter(x=>x.trim())
load()

})

}

function play(){

let line=list[index]

if(!line.includes(" : ")) return

let url=line.split(" : ")[1].trim()

if(hls) hls.destroy()

/* Ultra Smooth HLS */

hls=new Hls({

enableWorker:true,
lowLatencyMode:false,

backBufferLength:90,

maxBufferLength:20,
maxMaxBufferLength:40,
maxBufferSize:60*1000*1000,

startLevel:-1,
capLevelToPlayerSize:true,

abrEwmaFastLive:3,
abrEwmaSlowLive:9,

fragLoadingTimeOut:20000,
fragLoadingMaxRetry:6

})

hls.loadSource("/api/proxy?url="+encodeURIComponent(url))
hls.attachMedia(video)

video.pause()

hls.on(Hls.Events.MANIFEST_PARSED,function(){

let q=document.getElementById("quality")

q.innerHTML='<option value="-1">Auto</option>'

hls.levels.forEach((l,i)=>{
q.innerHTML+=`<option value="${i}">${l.height}p</option>`
})

})

highlight()

preloadNext()

}

function preloadNext(){

let nextIndex=index+1

if(!list[nextIndex]) return

let url=list[nextIndex].split(" : ")[1]

if(preloadHls) preloadHls.destroy()

preloadHls=new Hls()

preloadHls.loadSource("/api/proxy?url="+encodeURIComponent(url))

}

function load(){

const playlist=document.getElementById("playlist")

playlist.innerHTML=""

list.forEach((item,i)=>{

let name=item.split(" : ")[0]

let div=document.createElement("div")

div.className="item"
div.textContent=name

div.onclick=()=>{
index=i
play()
}

playlist.appendChild(div)

})

}

function next(){
index++
play()
}

function prev(){
index--
play()
}

function skip(s){
video.currentTime+=s
}

/* Smooth speed */

function speed(v){

video.playbackRate=1

setTimeout(()=>{
video.playbackRate=v
},200)

}

/* Quality */

function setQuality(level){
if(hls) hls.currentLevel=parseInt(level)
}

function toggleFull(){

let player=document.getElementById("playerContainer")

if(!document.fullscreenElement){
player.requestFullscreen()
}else{
document.exitFullscreen()
}

}

function searchVideo(){

let val=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".item").forEach(x=>{
x.style.display=
x.textContent.toLowerCase().includes(val)
?"block":"none"
})

}

function highlight(){

document.querySelectorAll(".item")
.forEach(x=>x.classList.remove("active"))

document.querySelectorAll(".item")[index]
?.classList.add("active")

}

</script>

</body>
</html>
