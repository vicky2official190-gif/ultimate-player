<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
margin:0;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:300px;
background:#111;
display:flex;
flex-direction:column;
border-right:1px solid #222;
transition:0.3s;
}

.logo{
padding:15px;
font-size:20px;
font-weight:bold;
background:#000;
}

.topbar{
padding:10px;
display:flex;
gap:5px;
background:#111;
}

#playlist{
overflow-y:auto;
flex:1;
}

.item{
padding:12px;
cursor:pointer;
border-bottom:1px solid #222;
font-size:14px;
}

.item:hover{
background:#222;
}

.active{
background:#333;
}

/* Player */

.main{
flex:1;
display:flex;
flex-direction:column;
}

#playerContainer{
flex:1;
display:flex;
flex-direction:column;
background:black;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

/* Controls */

.controls{
display:flex;
justify-content:center;
gap:8px;
padding:8px;
background:rgba(0,0,0,0.7);
transition:opacity 0.3s;
flex-wrap:wrap;
}

.controls.hide{
opacity:0;
pointer-events:none;
}

#playerContainer:fullscreen video{
height:100vh;
width:100vw;
}

#playerContainer:fullscreen .controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
border-radius:10px;
}

/* Buttons */

button,select,input{
padding:8px;
background:#111;
color:white;
border:1px solid #333;
cursor:pointer;
font-size:14px;
}

/* Mobile View */

.mobile-toggle{
display:none;
padding:10px;
background:#000;
cursor:pointer;
}

@media(max-width:768px){

.sidebar{
position:absolute;
left:-100%;
height:100%;
z-index:1000;
}

.sidebar.show{
left:0;
}

.mobile-toggle{
display:block;
}

.container{
flex-direction:column;
}

.main{
height:100%;
}

.controls{
position:absolute;
bottom:0;
width:100%;
}

video{
height:100%;
}

}

</style>

</head>

<body>

<div class="mobile-toggle" onclick="toggleSidebar()">
☰ Lectures
</div>

<div class="container">

<div class="sidebar" id="sidebar">

<div class="logo">
🎬 Ultimate Player
</div>

<div class="topbar">

<select onchange="loadTxt(this.value)" style="flex:1">
<option value="videos.txt">Videos</option>
<option value="arithmetic.txt">Arithmetic</option>
</select>

<input 
type="text"
id="search"
placeholder="Search..."
onkeyup="searchVideo()"
style="flex:1"
>

</div>

<div id="playlist"></div>

</div>

<div class="main">

<div id="playerContainer">

<video id="video" controls autoplay playsinline></video>

<div class="controls">

<button onclick="prev()">⏮</button>
<button onclick="skip(-10)">⏪10s</button>
<button onclick="skip(10)">⏩10s</button>
<button onclick="next()">⏭</button>

<select onchange="speed(this.value)">
<option value="1">1x</option>
<option value="1.25">1.25x</option>
<option value="1.5">1.5x</option>
<option value="1.75">1.75x</option>
<option value="2">2x</option>
</select>

<button onclick="toggleFull()">⛶</button>

</div>

</div>

</div>

</div>

<script>

let list=[]
let index=0
let hls

const video=document.getElementById("video")
const playlist=document.getElementById("playlist")
const controls=document.querySelector(".controls")
const player=document.getElementById("playerContainer")

loadTxt("videos.txt")

function loadTxt(file){

fetch(file)
.then(r=>r.text())
.then(data=>{

list=data.split("\n").filter(x=>x.trim())

index=0
load()
play()

})

}

function createHls(){

return new Hls({
enableWorker:true,
lowLatencyMode:false
})

}

function play(){

let line=list[index]

if(!line.includes(" : ")) return

let parts=line.split(" : ")

let url=parts[1].trim()

if(hls) hls.destroy()

hls=createHls()

hls.loadSource("/api/proxy?url="+encodeURIComponent(url))
hls.attachMedia(video)

highlight()

}

function load(){

playlist.innerHTML=""

list.forEach((item,i)=>{

if(!item.includes(" : ")) return

let name=item.split(" : ")[0]

let div=document.createElement("div")

div.className="item"
div.textContent=name

div.onclick=()=>{
index=i
play()
toggleSidebar()
}

playlist.appendChild(div)

})

}

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("show")
}

function searchVideo(){

let input=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".item").forEach(item=>{

item.style.display=
item.textContent.toLowerCase().includes(input)
? "block" : "none"

})

}

function next(){index++;play()}
function prev(){index--;play()}
function skip(s){video.currentTime+=s}

function speed(v){video.playbackRate=v}

function toggleFull(){

if(!document.fullscreenElement){
player.requestFullscreen()
}else{
document.exitFullscreen()
}

}

function highlight(){

document.querySelectorAll(".item")
.forEach(x=>x.classList.remove("active"))

document.querySelectorAll(".item")[index]
?.classList.add("active")

}

/* Auto hide controls */

let timer

function showControls(){

controls.classList.remove("hide")

clearTimeout(timer)

timer=setTimeout(()=>{
controls.classList.add("hide")
},3000)

}

player.addEventListener("mousemove",showControls)
player.addEventListener("touchstart",showControls)

</script>

</body>
</html>
