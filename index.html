<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ultimate Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

/* Layout */

.container{
display:flex;
height:100vh;
}

.sidebar{
width:300px;
background:#111;
display:flex;
flex-direction:column;
transition:.3s;
}

.sidebar.hide{
left:-100%;
}

.logo{
padding:15px;
background:#000;
font-size:18px;
}

.topbar{
display:flex;
gap:5px;
padding:10px;
background:#111;
}

#playlist{
flex:1;
overflow:auto;
}

.item{
padding:12px;
border-bottom:1px solid #222;
cursor:pointer;
}

.item:hover{
background:#222;
}

.active{
background:#333;
}

/* Player */

.main{
flex:1;
display:flex;
flex-direction:column;
}

#playerContainer{
flex:1;
position:relative;
background:black;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

/* Controls */

.controls{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
background:rgba(0,0,0,.6);
padding:8px;
border-radius:12px;
transition:.3s;
}

.controls.hide{
opacity:0;
pointer-events:none;
}

button,select{
background:#111;
color:white;
border:1px solid #333;
padding:6px 8px;
border-radius:6px;
}

/* Mobile */

.mobile-toggle{
display:none;
padding:10px;
background:black;
}

@media(max-width:768px){

.container{
flex-direction:column;
}

.sidebar{
position:absolute;
height:100%;
z-index:999;
left:-100%;
}

.sidebar.show{
left:0;
}

.mobile-toggle{
display:block;
}

.controls{
width:95%;
justify-content:center;
flex-wrap:wrap;
}

}

</style>

</head>

<body>

<div class="mobile-toggle" onclick="toggleSidebar()">
☰ Lectures
</div>

<div class="container">

<div class="sidebar" id="sidebar">

<div class="logo">
Ultimate Player
</div>

<div class="topbar">

<select onchange="loadTxt(this.value)">
<option value="videos.txt">Videos</option>
<option value="arithmetic.txt">Arithmetic</option>
</select>

<input 
id="search"
placeholder="Search"
onkeyup="searchVideo()"
style="flex:1"
>

</div>

<div id="playlist"></div>

</div>

<div class="main">

<div id="playerContainer">

<video id="video" playsinline controls></video>

<div class="controls" id="controls">

<button onclick="prev()">⏮</button>
<button onclick="skip(-10)">⏪</button>
<button onclick="skip(10)">⏩</button>
<button onclick="next()">⏭</button>

<select onchange="speed(this.value)">
<option value="1">1x</option>
<option value="1.25">1.25x</option>
<option value="1.5">1.5x</option>
<option value="1.75">1.75x</option>
<option value="2">2x</option>
</select>

<select onchange="quality(this.value)" id="quality">
<option value="-1">Auto</option>
</select>

<button onclick="toggleFull()">⛶</button>

</div>

</div>

</div>

</div>

<script>

let list=[]
let index=0
let hls

const video=document.getElementById("video")
const playlist=document.getElementById("playlist")
const controls=document.getElementById("controls")
const player=document.getElementById("playerContainer")

loadTxt("videos.txt")

function loadTxt(file){

fetch(file)
.then(r=>r.text())
.then(data=>{

list=data.split("\n").filter(x=>x.trim())
index=0
load()
play()

})

}

function play(){

let line=list[index]

if(!line.includes(" : ")) return

let url=line.split(" : ")[1].trim()

if(hls) hls.destroy()

hls=new Hls()

hls.loadSource("/api/proxy?url="+encodeURIComponent(url))

hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED, function(){

video.play()

let quality=document.getElementById("quality")

quality.innerHTML='<option value="-1">Auto</option>'

hls.levels.forEach((l,i)=>{
quality.innerHTML+=`<option value="${i}">${l.height}p</option>`
})

})

highlight()

}

/* Quality */

function quality(level){

if(hls){
hls.currentLevel=parseInt(level)
}

}

/* Controls */

function next(){index++;play()}
function prev(){index--;play()}
function skip(s){video.currentTime+=s}

function speed(v){
video.playbackRate=v
}

/* Fullscreen + rotate */

function toggleFull(){

if(!document.fullscreenElement){

player.requestFullscreen()

if(screen.orientation && screen.orientation.lock){
screen.orientation.lock("landscape")
}

}else{

document.exitFullscreen()

if(screen.orientation){
screen.orientation.unlock()
}

}

}

/* Sidebar */

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("show")
}

/* Search */

function searchVideo(){

let val=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".item").forEach(x=>{
x.style.display=
x.textContent.toLowerCase().includes(val)
?"block":"none"
})

}

/* Playlist */

function load(){

playlist.innerHTML=""

list.forEach((item,i)=>{

let name=item.split(" : ")[0]

let div=document.createElement("div")

div.className="item"
div.textContent=name

div.onclick=()=>{
index=i
play()
toggleSidebar()
}

playlist.appendChild(div)

})

}

function highlight(){

document.querySelectorAll(".item")
.forEach(x=>x.classList.remove("active"))

document.querySelectorAll(".item")[index]?.classList.add("active")

}

/* Auto hide controls */

let timer

function showControls(){

controls.classList.remove("hide")

clearTimeout(timer)

timer=setTimeout(()=>{
controls.classList.add("hide")
},3000)

}

player.addEventListener("mousemove",showControls)
player.addEventListener("touchstart",showControls)

</script>

</body>
</html>
