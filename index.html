<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ultimate Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:#111;
display:flex;
flex-direction:column;
}

.logo{
padding:12px;
background:#000;
font-weight:bold;
}

.topbar{
display:flex;
gap:5px;
padding:10px;
background:#111;
}

#playlist{
flex:1;
overflow:auto;
}

.item{
padding:12px;
border-bottom:1px solid #222;
cursor:pointer;
}

.active{
background:#333;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

#playerContainer{
flex:1;
position:relative;
background:black;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

/* Controls */

.controls{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
padding:8px 10px;
background:rgba(0,0,0,0.6);
border-radius:12px;
z-index:999;
white-space:nowrap;
transition:opacity .3s ease;
}

.controls.hide{
opacity:0;
pointer-events:none;
}

.controls button,
.controls select{
padding:6px 8px;
font-size:12px;
background:#111;
color:white;
border:1px solid #333;
}

/* Mobile */

@media(max-width:768px){

.container{
flex-direction:column;
height:100vh;
}

.main{
height:220px;
flex:none;
}

#playerContainer{
height:220px;
}

.sidebar{
height:calc(100vh - 220px);
display:flex;
flex-direction:column;
}

#playlist{
flex:1;
overflow-y:auto;
}

}

</style>

</head>

<body>

<div class="container">

<div class="main">

<div id="playerContainer">

<video id="video" playsinline controls></video>

<div class="controls" id="controls">

<button onclick="prev()">⏮</button>
<button onclick="skip(-10)">⏪10s</button>
<button onclick="skip(10)">⏩10s</button>
<button onclick="next()">⏭</button>

<select onchange="speed(this.value)">
<option value="1">1x</option>
<option value="1.25">1.25x</option>
<option value="1.5">1.5x</option>
<option value="1.75">1.75x</option>
<option value="2">2x</option>
</select>

<select id="quality" onchange="setQuality(this.value)">
<option value="-1" selected>Auto</option>
</select>

<button onclick="toggleFull()">⛶</button>

</div>

</div>

</div>

<div class="sidebar">

<div class="logo">
🎬 Ultimate Player
</div>

<div class="topbar">

<select onchange="loadTxt(this.value)">
<option value="videos.txt">Videos</option>
<option value="arithmetic.txt">Arithmetic</option>
</select>

<input 
id="search"
placeholder="Search"
onkeyup="searchVideo()"
style="flex:1"
>

</div>

<div id="playlist"></div>

</div>

</div>

<script>

let list=[]
let index=0
let hls

const video=document.getElementById("video")
const playlist=document.getElementById("playlist")

loadTxt("videos.txt")

function loadTxt(file){

fetch(file)
.then(r=>r.text())
.then(data=>{

list=data.split("\n").filter(x=>x.trim())
index=0
load()
play()

})

}

function play(){

let line=list[index]

if(!line.includes(" : ")) return

let url=line.split(" : ")[1].trim()

if(hls) hls.destroy()

/* Performance Optimized HLS */

hls = new Hls({
enableWorker:true,
lowLatencyMode:true,
backBufferLength:90,

maxBufferLength:10,
maxMaxBufferLength:20,
maxBufferSize:60*1000*1000,

capLevelToPlayerSize:true,
startLevel:-1,

abrEwmaFastLive:2,
abrEwmaSlowLive:5,

fragLoadingTimeOut:20000,
fragLoadingMaxRetry:6,

manifestLoadingTimeOut:20000,
manifestLoadingMaxRetry:6
})

hls.loadSource("/api/proxy?url="+encodeURIComponent(url))

hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED,function(){

if(window.innerWidth < 768){
hls.currentLevel=1
}

video.play()

let q=document.getElementById("quality")

q.innerHTML='<option value="-1">Auto</option>'

hls.levels.forEach((l,i)=>{
q.innerHTML+=`<option value="${i}">${l.height}p</option>`
})

})

highlight()

}

function load(){

playlist.innerHTML=""

list.forEach((item,i)=>{

let name=item.split(" : ")[0]

let div=document.createElement("div")

div.className="item"
div.textContent=name

div.onclick=()=>{
index=i
play()
}

playlist.appendChild(div)

})

}

function highlight(){

document.querySelectorAll(".item")
.forEach(x=>x.classList.remove("active"))

document.querySelectorAll(".item")[index]
?.classList.add("active")

}

function next(){index++;play()}
function prev(){index--;play()}
function skip(s){video.currentTime+=s}

function speed(v){

video.playbackRate=1

setTimeout(()=>{
video.playbackRate=v
},200)

if(v>1.25 && hls){
hls.currentLevel=Math.max(0,hls.currentLevel-1)
}

if(hls){
hls.startLoad()
}

}

function setQuality(level){
if(hls) hls.currentLevel=parseInt(level)
}

function toggleFull(){

let player=document.getElementById("playerContainer")

if(!document.fullscreenElement){

player.requestFullscreen()

if(screen.orientation && screen.orientation.lock){
screen.orientation.lock("landscape")
}

}else{

document.exitFullscreen()

if(screen.orientation){
screen.orientation.unlock()
}

}

}

function searchVideo(){

let val=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".item").forEach(x=>{
x.style.display=
x.textContent.toLowerCase().includes(val)
?"block":"none"
})

}

/* Auto hide controls */

const controls=document.getElementById("controls")
const player=document.getElementById("playerContainer")

let hideTimer

function showControls(){

controls.classList.remove("hide")

clearTimeout(hideTimer)

hideTimer=setTimeout(()=>{
controls.classList.add("hide")
},3000)

}

player.addEventListener("mousemove",showControls)
player.addEventListener("touchstart",showControls)

</script>

</body>
</html>
