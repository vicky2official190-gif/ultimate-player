<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#000;
margin:0;
font-family:Arial;
color:white;
}

/* Video */

.video-container{
position:relative;
width:100%;
height:50vh;
background:black;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

/* controls */

.controls{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(transparent,rgba(0,0,0,0.8));
padding:10px;
box-sizing:border-box;
transition:opacity .3s;
}

.controls.hide{
opacity:0;
}

/* progress */

.progress-container{
width:100%;
height:4px;
background:#444;
cursor:pointer;
margin-bottom:8px;
}

.progress{
height:100%;
width:0%;
background:red;
}

/* buttons */

.controls-row{
display:flex;
align-items:center;
gap:10px;
}

button{
background:none;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

input[type="range"]{
width:100px;
}

/* header */

.header{
display:flex;
gap:10px;
padding:10px;
background:#111;
}

.btn{
background:#222;
padding:6px 12px;
cursor:pointer;
}

.search{
margin-left:auto;
}

.search input{
background:#222;
border:1px solid #444;
color:white;
padding:5px;
}

/* playlist */

.item{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

@media(max-width:768px){

.video-container{
height:35vh;
}

}

</style>

</head>

<body>

<div class="video-container" id="videoContainer">

<video id="video" playsinline></video>

<div class="controls" id="controls">

<div class="progress-container" id="progressContainer">
<div class="progress" id="progress"></div>
</div>

<div class="controls-row">

<button onclick="togglePlay()">▶</button>

<button onclick="rewind()">⏪</button>
<button onclick="forward()">⏩</button>

<span id="time">00:00 / 00:00</span>

<input type="range" min="0" max="1" step="0.01"
oninput="video.volume=this.value">

<select onchange="changeSpeed(this.value)">
<option>0.5</option>
<option>0.75</option>
<option selected>1</option>
<option>1.25</option>
<option>1.5</option>
<option>1.75</option>
<option>2</option>
</select>

<button onclick="toggleFullscreen()">⛶</button>

</div>

</div>

</div>

<div class="header">
<div class="btn" onclick="loadList('videos')">Videos</div>
<div class="btn" onclick="loadList('arithmetic')">Arithmetic</div>

<div class="search">
<input id="search" placeholder="Search" onkeyup="searchVideo()">
</div>

</div>

<div id="playlist"></div>

<script>

const video=document.getElementById("video");
const progress=document.getElementById("progress");
const progressContainer=document.getElementById("progressContainer");
const controls=document.getElementById("controls");
const time=document.getElementById("time");

let currentHls;
let hideTimer;

function proxy(url){
return "https://ultimate-player.vicky2official1-90.workers.dev/proxy?url="+encodeURIComponent(url);
}

/* play */

function togglePlay(){

if(video.paused){
video.play();
}else{
video.pause();
}

}

/* skip */

function rewind(){ video.currentTime-=10 }
function forward(){ video.currentTime+=10 }

/* progress */

video.addEventListener("timeupdate",()=>{

const percent=(video.currentTime/video.duration)*100;
progress.style.width=percent+"%";

time.innerText=
format(video.currentTime)+" / "+format(video.duration);

});

/* click seek */

progressContainer.addEventListener("click",(e)=>{

const width=progressContainer.clientWidth;
const click=e.offsetX;
video.currentTime=(click/width)*video.duration;

});

/* format */

function format(t){

if(!t) return "00:00";

let m=Math.floor(t/60);
let s=Math.floor(t%60);

return `${m}:${s<10?"0":""}${s}`;

}

/* fullscreen */

function toggleFullscreen(){

const container=document.getElementById("videoContainer");

if(!document.fullscreenElement){
container.requestFullscreen();
}else{
document.exitFullscreen();
}

}

/* speed */

function changeSpeed(s){
video.playbackRate=s;
}

/* auto hide */

function showControls(){

controls.classList.remove("hide");

clearTimeout(hideTimer);

hideTimer=setTimeout(()=>{
controls.classList.add("hide");
},3000);

}

document.getElementById("videoContainer")
.addEventListener("mousemove",showControls);

document.getElementById("videoContainer")
.addEventListener("touchstart",showControls);

/* keyboard */

document.addEventListener("keydown",(e)=>{

if(e.code==="Space"){
e.preventDefault();
togglePlay();
}

if(e.key==="ArrowRight") forward();
if(e.key==="ArrowLeft") rewind();

});

/* double click */

video.addEventListener("dblclick",togglePlay);

/* load list */

let allItems=[];
const playlist=document.getElementById("playlist");

function loadList(type){

let url= type==="videos"
? "https://ultimate-player.vicky2official1-90.workers.dev/videos.txt"
: "https://ultimate-player.vicky2official1-90.workers.dev/arithmetic.txt";

fetch(url).then(r=>r.text()).then(data=>{

allItems=[];
playlist.innerHTML="";

data.split("\n").forEach(line=>{

if(line.includes("http")){

const parts=line.split(":");
const title=parts[0];
const videoUrl=parts.slice(1).join(":").trim();

allItems.push({title,videoUrl});

}

});

render(allItems);

});

}

function render(list){

playlist.innerHTML="";

list.forEach(item=>{

const div=document.createElement("div");
div.className="item";
div.textContent=item.title;

div.onclick=()=>play(proxy(item.videoUrl));

playlist.appendChild(div);

});

}

function searchVideo(){

const q=document.getElementById("search").value.toLowerCase();

render(allItems.filter(i=>i.title.toLowerCase().includes(q)));

}

/* play */

function play(url){

if(currentHls) currentHls.destroy();

if(Hls.isSupported()){

currentHls=new Hls();
currentHls.loadSource(url);
currentHls.attachMedia(video);

}else{

video.src=url;

}

video.play();

}

loadList("videos");

</script>

</body>
</html>
