<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
overflow-x:hidden;
}

/* Video container */

.video-container{
position:relative;
background:black;
width:100%;
height:50vh;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

/* fullscreen */

.video-container:fullscreen{
height:100vh;
}

.video-container:fullscreen video{
height:100vh;
}

/* Controls BELOW progress bar */

.controls{
display:flex;
justify-content:center;
gap:10px;
background:#111;
padding:10px;
}

.controls button,
.controls select{
background:#222;
color:white;
border:1px solid #444;
padding:6px 12px;
cursor:pointer;
border-radius:6px;
}

/* mobile */

@media(max-width:768px){

.video-container{
height:40vh;
}

.controls{
flex-wrap:wrap;
gap:5px;
}

.controls button,
.controls select{
font-size:12px;
padding:5px 8px;
}

}

/* header */

.header{
display:flex;
gap:10px;
padding:10px;
background:#111;
}

.btn{
padding:8px 12px;
background:#222;
border-radius:5px;
cursor:pointer;
}

/* playlist */

#playlist{
padding:10px;
}

.item{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.item:hover{
background:#222;
}

</style>

</head>

<body>

<div class="video-container" id="videoContainer">
<video id="video" controls playsinline webkit-playsinline></video>
</div>

<!-- Controls BELOW video -->

<div class="controls">

<button onclick="rewind()">⏪ 10s</button>
<button onclick="forward()">⏩ 10s</button>

<select onchange="changeSpeed(this.value)">
<option value="0.5">0.5x</option>
<option value="0.75">0.75x</option>
<option value="1" selected>1x</option>
<option value="1.25">1.25x</option>
<option value="1.5">1.5x</option>
<option value="1.75">1.75x</option>
<option value="2">2x</option>
</select>

<select onchange="changeQuality(this.value)">
<option value="720">720p</option>
<option value="480">480p</option>
<option value="360">360p</option>
<option value="240">240p</option>
</select>

<button onclick="toggleFullscreen()">⛶</button>

</div>

<div class="header">
<div class="btn" onclick="loadList('videos')">Videos</div>
<div class="btn" onclick="loadList('arithmetic')">Arithmetic</div>
</div>

<div id="playlist"></div>

<script>

const video = document.getElementById('video');
const playlist = document.getElementById('playlist');
const videoContainer = document.getElementById('videoContainer');

let currentHls;

function proxy(url){
return "https://ultimate-player.vicky2official1-90.workers.dev/proxy?url=" + encodeURIComponent(url);
}

function loadList(type){

playlist.innerHTML="Loading...";

let url="";

if(type==="videos"){
url="https://ultimate-player.vicky2official1-90.workers.dev/videos.txt";
}

if(type==="arithmetic"){
url="https://ultimate-player.vicky2official1-90.workers.dev/arithmetic.txt";
}

fetch(url)
.then(res => res.text())
.then(data => {

playlist.innerHTML="";

const lines=data.split('\n');

lines.forEach(line=>{

if(line.includes("http")){

const parts=line.split(":");
const title=parts[0];
const videoUrl=parts.slice(1).join(":").trim();

const div=document.createElement("div");
div.className="item";
div.textContent=title;

div.onclick=()=>{
playVideo(proxy(videoUrl));
};

playlist.appendChild(div);

}

});

});

}

function playVideo(url){

if(currentHls){
currentHls.destroy();
}

if(Hls.isSupported()){
currentHls=new Hls();
currentHls.loadSource(url);
currentHls.attachMedia(video);

currentHls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play().catch(()=>{});
});

}else{
video.src=url;
video.play();
}

}

/* skip */

function rewind(){
video.currentTime -= 10;
}

function forward(){
video.currentTime += 10;
}

/* speed */

function changeSpeed(speed){
video.playbackRate = speed;
}

/* quality */

function changeQuality(q){
if(currentHls){
const levels = currentHls.levels;
levels.forEach((level,index)=>{
if(level.height == q){
currentHls.currentLevel = index;
}
});
}
}

/* fullscreen */

function toggleFullscreen(){

if(!document.fullscreenElement){
videoContainer.requestFullscreen();
}else{
document.exitFullscreen();
}

}

loadList("videos");

</script>

</body>
</html>
