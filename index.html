<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#000;
margin:0;
font-family:Arial;
color:white;
}

/* Video */

.video-container{
position:relative;
width:100%;
height:50vh;
background:black;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

/* Controls */

.controls{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
padding:10px;
transition:opacity .3s;
}

.controls.hide{
opacity:0;
}

/* Progress */

.progress-container{
width:100%;
height:4px;
background:#444;
cursor:pointer;
margin-bottom:8px;
}

.progress{
height:100%;
width:0%;
background:#ff0000;
}

/* Control row */

.controls-row{
display:flex;
align-items:center;
gap:10px;
}

/* Buttons */

button{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

input[type="range"]{
width:100px;
}

/* header */

.header{
display:flex;
gap:10px;
padding:10px;
background:#111;
}

.btn{
background:#222;
padding:6px 12px;
cursor:pointer;
border-radius:6px;
}

.search{
margin-left:auto;
}

.search input{
background:#222;
border:1px solid #444;
color:white;
padding:5px;
border-radius:5px;
}

/* playlist */

.item{
padding:12px;
border-bottom:1px solid #333;
cursor:pointer;
}

/* MOBILE UI */

@media(max-width:768px){

.video-container{
height:30vh;
}

.controls{
padding:8px;
}

button{
font-size:22px;
}

.controls-row{
justify-content:space-between;
}

input[type="range"]{
width:70px;
}

}

/* Fullscreen */

.video-container:fullscreen{
height:100vh;
}

.video-container:fullscreen video{
height:100vh;
}

</style>

</head>

<body>

<div class="video-container" id="videoContainer">

<video id="video" playsinline webkit-playsinline></video>

<div class="controls" id="controls">

<div class="progress-container" id="progressContainer">
<div class="progress" id="progress"></div>
</div>

<div class="controls-row">

<button onclick="togglePlay()">⏯</button>

<button onclick="rewind()">⏪</button>
<button onclick="forward()">⏩</button>

<span id="time">00:00 / 00:00</span>

<input type="range" min="0" max="1" step="0.01"
oninput="video.volume=this.value">

<select onchange="changeSpeed(this.value)">
<option>0.5</option>
<option>0.75</option>
<option selected>1</option>
<option>1.25</option>
<option>1.5</option>
<option>1.75</option>
<option>2</option>
</select>

<button onclick="toggleFullscreen()">⛶</button>

</div>

</div>

</div>

<div class="header">
<div class="btn" onclick="loadList('videos')">Videos</div>
<div class="btn" onclick="loadList('arithmetic')">Arithmetic</div>

<div class="search">
<input id="search" placeholder="Search" onkeyup="searchVideo()">
</div>

</div>

<div id="playlist"></div>

<script>

const video=document.getElementById("video");
const progress=document.getElementById("progress");
const progressContainer=document.getElementById("progressContainer");
const controls=document.getElementById("controls");
const time=document.getElementById("time");
const container=document.getElementById("videoContainer");

let currentHls;
let hideTimer;

function proxy(url){
return "https://ultimate-player.vicky2official1-90.workers.dev/proxy?url="+encodeURIComponent(url);
}

/* Play */

function togglePlay(){
video.paused ? video.play() : video.pause();
}

/* Skip */

function rewind(){ video.currentTime-=10 }
function forward(){ video.currentTime+=10 }

/* Progress */

video.addEventListener("timeupdate",()=>{

const percent=(video.currentTime/video.duration)*100;
progress.style.width=percent+"%";

time.innerText=
format(video.currentTime)+" / "+format(video.duration);

});

/* Seek */

progressContainer.addEventListener("click",(e)=>{

const width=progressContainer.clientWidth;
video.currentTime=(e.offsetX/width)*video.duration;

});

/* Format */

function format(t){
if(!t) return "00:00";
let m=Math.floor(t/60);
let s=Math.floor(t%60);
return `${m}:${s<10?"0":""}${s}`;
}

/* Fullscreen + Rotate */

function toggleFullscreen(){

if(!document.fullscreenElement){

container.requestFullscreen();

if(screen.orientation && screen.orientation.lock){
screen.orientation.lock('landscape').catch(()=>{});
}

}else{

document.exitFullscreen();

if(screen.orientation && screen.orientation.unlock){
screen.orientation.unlock();
}

}

}

/* Speed */

function changeSpeed(s){
video.playbackRate=s;
}

/* Auto hide */

function showControls(){

controls.classList.remove("hide");

clearTimeout(hideTimer);

hideTimer=setTimeout(()=>{
controls.classList.add("hide");
},3000);

}

container.addEventListener("mousemove",showControls);
container.addEventListener("touchstart",showControls);

/* Keyboard */

document.addEventListener("keydown",(e)=>{

if(e.code==="Space"){
e.preventDefault();
togglePlay();
}

if(e.key==="ArrowRight") forward();
if(e.key==="ArrowLeft") rewind();

});

/* Double tap */

video.addEventListener("dblclick",togglePlay);

/* HLS */

function play(url){

if(currentHls) currentHls.destroy();

if(Hls.isSupported()){
currentHls=new Hls();
currentHls.loadSource(url);
currentHls.attachMedia(video);
}else{
video.src=url;
}

video.play();

}

/* Playlist */

let allItems=[];
const playlist=document.getElementById("playlist");

function loadList(type){

let url= type==="videos"
? "https://ultimate-player.vicky2official1-90.workers.dev/videos.txt"
: "https://ultimate-player.vicky2official1-90.workers.dev/arithmetic.txt";

fetch(url).then(r=>r.text()).then(data=>{

allItems=[];
data.split("\n").forEach(line=>{

if(line.includes("http")){
const parts=line.split(":");
allItems.push({
title:parts[0],
url:parts.slice(1).join(":").trim()
});
}

});

render(allItems);

});

}

function render(list){

playlist.innerHTML="";

list.forEach(item=>{

const div=document.createElement("div");
div.className="item";
div.textContent=item.title;

div.onclick=()=>play(proxy(item.url));

playlist.appendChild(div);

});

}

function searchVideo(){

const q=document.getElementById("search").value.toLowerCase();
render(allItems.filter(i=>i.title.toLowerCase().includes(q)));

}

loadList("videos");

</script>

</body>
</html>
