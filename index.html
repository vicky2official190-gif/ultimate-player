<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
}

/* sticky */

.sticky-player{
position:sticky;
top:0;
z-index:999;
background:#000;
}

/* video */

.video-container{
position:relative;
width:100%;
height:50vh;
background:black;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

/* controls */

.controls{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
padding:10px;
}

/* progress */

.progress-container{
width:100%;
height:4px;
background:#444;
margin-bottom:10px;
cursor:pointer;
}

.progress{
height:100%;
width:0%;
background:red;
}

/* bottom controls */

.bottom-controls{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.bottom-controls button,
.bottom-controls select{
background:#111;
border:1px solid #333;
color:white;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

/* header */

.header{
display:flex;
gap:10px;
padding:10px;
background:#111;
}

.btn{
background:#222;
padding:6px 12px;
cursor:pointer;
border-radius:6px;
}

.search{
margin-left:auto;
}

.search input{
background:#222;
border:1px solid #444;
color:white;
padding:5px;
}

/* playlist */

.item{
padding:12px;
border-bottom:1px solid #333;
cursor:pointer;
}

/* mobile */

@media(max-width:768px){

.video-container{
height:30vh;
}

.bottom-controls{
gap:5px;
}

}

/* fullscreen */

.video-container:fullscreen{
height:100vh;
}

.video-container:fullscreen video{
height:100vh;
}

</style>

</head>

<body>

<div class="sticky-player">

<div class="video-container" id="videoContainer">

<video id="video" playsinline></video>

<div class="controls">

<div class="progress-container" id="progressContainer">
<div class="progress" id="progress"></div>
</div>

<div class="bottom-controls">

<button onclick="rewind()">⏪ 10s</button>
<button onclick="forward()">⏩ 10s</button>

<select onchange="changeSpeed(this.value)">
<option>0.5x</option>
<option>0.75x</option>
<option selected>1x</option>
<option>1.25x</option>
<option>1.5x</option>
<option>1.75x</option>
<option>2x</option>
</select>

<select class="quality" onchange="changeQuality(this.value)">
<option value="-1">Auto</option>
</select>

<button onclick="toggleFullscreen()">⛶</button>

</div>

</div>

</div>

<div class="header">

<div class="btn" onclick="loadList('videos')">Videos</div>
<div class="btn" onclick="loadList('arithmetic')">Arithmetic</div>

<div class="search">
<input id="search" placeholder="Search" onkeyup="searchVideo()">
</div>

</div>

</div>

<div id="playlist"></div>

<script>

const video=document.getElementById("video");
const progress=document.getElementById("progress");
const progressContainer=document.getElementById("progressContainer");

let currentHls;

/* progress */

video.addEventListener("timeupdate",()=>{

const percent=(video.currentTime/video.duration)*100;
progress.style.width=percent+"%";

});

progressContainer.addEventListener("click",(e)=>{

const width=progressContainer.clientWidth;
video.currentTime=(e.offsetX/width)*video.duration;

});

/* skip */

function rewind(){ video.currentTime-=10 }
function forward(){ video.currentTime+=10 }

/* speed */

function changeSpeed(speed){
video.playbackRate=speed;
}

/* fullscreen + rotate */

function toggleFullscreen(){

const container=document.getElementById("videoContainer");

if(!document.fullscreenElement){

container.requestFullscreen();

if(screen.orientation){
screen.orientation.lock("landscape").catch(()=>{});
}

}else{

document.exitFullscreen();

if(screen.orientation){
screen.orientation.unlock();
}

}

}

/* quality */

function changeQuality(level){

if(currentHls){
currentHls.currentLevel=level;
}

}

function setupQuality(){

const quality=document.querySelector(".quality");

quality.innerHTML='<option value="-1">Auto</option>';

currentHls.levels.forEach((level,index)=>{

const option=document.createElement("option");

option.value=index;
option.text=level.height+"p";

quality.appendChild(option);

});

}

/* play */

function play(url){

if(currentHls) currentHls.destroy();

if(Hls.isSupported()){

currentHls=new Hls();

currentHls.loadSource(url);
currentHls.attachMedia(video);

currentHls.on(Hls.Events.MANIFEST_PARSED,()=>{

setupQuality();
video.play();

});

}else{

video.src=url;
video.play();

}

}

/* playlist */

let allItems=[];
const playlist=document.getElementById("playlist");

function proxy(url){
return "https://ultimate-player.vicky2official1-90.workers.dev/proxy?url="+encodeURIComponent(url);
}

function loadList(type){

let url= type==="videos"
? "https://ultimate-player.vicky2official1-90.workers.dev/videos.txt"
: "https://ultimate-player.vicky2official1-90.workers.dev/arithmetic.txt";

fetch(url).then(r=>r.text()).then(data=>{

allItems=[];

data.split("\n").forEach(line=>{

if(line.includes("http")){

const parts=line.split(":");

allItems.push({
title:parts[0],
url:parts.slice(1).join(":").trim()
});

}

});

render(allItems);

});

}

function render(list){

playlist.innerHTML="";

list.forEach(item=>{

const div=document.createElement("div");

div.className="item";
div.textContent=item.title;

div.onclick=()=>play(proxy(item.url));

playlist.appendChild(div);

});

}

function searchVideo(){

const q=document.getElementById("search").value.toLowerCase();

render(allItems.filter(i=>i.title.toLowerCase().includes(q)));

}

loadList("videos");

/* keyboard */

document.addEventListener("keydown",(e)=>{

if(e.code==="Space"){
e.preventDefault();
video.paused?video.play():video.pause();
}

if(e.key==="ArrowRight") forward();
if(e.key==="ArrowLeft") rewind();

});

/* double click */

video.addEventListener("dblclick",()=>{
video.paused?video.play():video.pause();
});

</script>

</body>
</html>
