<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:#111;
display:flex;
flex-direction:column;
}

.logo{
padding:10px;
font-size:18px;
background:#000;
}

.top{
display:flex;
gap:5px;
padding:8px;
}

#playlist{
overflow:auto;
flex:1;
}

.item{
padding:10px;
border-bottom:1px solid #222;
cursor:pointer;
}

.item:hover{
background:#222;
}

.active{
background:#333;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.player{
flex:1;
position:relative;
background:black;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

.controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:5px;
background:rgba(0,0,0,0.6);
padding:8px;
border-radius:10px;
}

.controls button,
.controls select{
background:#111;
color:white;
border:1px solid #333;
padding:6px;
}

@media(max-width:768px){

.container{
flex-direction:column;
}

.main{
height:230px;
}

.sidebar{
height:calc(100vh - 230px);
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<div class="main">

<div class="player">

<video id="video" controls playsinline></video>

<div class="controls" id="controls">

<button onclick="prev()">⏮</button>
<button onclick="skip(-10)">⏪10s</button>
<button onclick="skip(10)">10s⏩</button>
<button onclick="next()">⏭</button>

<select onchange="speed(this.value)">
<option value="1">1x</option>
<option value="1.25">1.25x</option>
<option value="1.5">1.5x</option>
<option value="1.75">1.75x</option>
<option value="2">2x</option>
</select>

<select id="quality"></select>

<button onclick="fullscreen()">⛶</button>

</div>

</div>

</div>

<div class="sidebar">

<div class="logo">Ultimate Player</div>

<div class="top">

<select onchange="loadFile(this.value)">
<option value="videos.txt">Videos</option>
<option value="arithmetic.txt">Arithmetic</option>
</select>

<input id="search" placeholder="Search" onkeyup="search()" style="flex:1">

</div>

<div id="playlist"></div>

</div>

</div>

<script>

let list=[]
let index=0
let hls

loadFile("videos.txt")

function loadFile(file){

fetch(file)
.then(r=>r.text())
.then(data=>{
list=data.split("\n").filter(x=>x.trim())
load()
})

}

function load(){

playlist.innerHTML=""

list.forEach((item,i)=>{

let name=item.split("|")[0]
let url=item.split("|")[1]

let div=document.createElement("div")
div.className="item"
div.innerText=name

div.onclick=()=>{
index=i
play(url)
highlight()
}

playlist.appendChild(div)

})

}

function play(url){

const video=document.getElementById("video")

if(hls){
hls.destroy()
}

hls=new Hls({

maxBufferLength:30,
maxMaxBufferLength:60,
enableWorker:true

})

hls.loadSource(
"https://nameless-mode-a54e.vicky2official1-90.workers.dev/?url="
+ encodeURIComponent(url)
)

hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED,function(){

let q=document.getElementById("quality")

q.innerHTML=""

hls.levels.forEach((l,i)=>{
q.innerHTML+=`<option value="${i}">${l.height}p</option>`
})

})

video.play()

}

function next(){
index++
if(index>=list.length) index=0
play(list[index].split("|")[1])
highlight()
}

function prev(){
index--
if(index<0) index=list.length-1
play(list[index].split("|")[1])
highlight()
}

function skip(t){
video.currentTime+=t
}

function speed(s){
video.playbackRate=s
}

function fullscreen(){

let el=document.querySelector(".player")

if(!document.fullscreenElement){
el.requestFullscreen()
}else{
document.exitFullscreen()
}

}

function highlight(){

document.querySelectorAll(".item").forEach(x=>{
x.classList.remove("active")
})

document.querySelectorAll(".item")[index].classList.add("active")

}

function search(){

let val=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".item").forEach(x=>{
x.style.display=
x.innerText.toLowerCase().includes(val)
?"block":"none"
})

}

</script>

</body>
</html>
