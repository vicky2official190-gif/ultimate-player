<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
}

.video-container{
position:relative;
}

video{
width:100%;
height:50vh;
background:black;
}

/* Controls Bottom Center */

.controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
background:rgba(0,0,0,0.7);
padding:8px 12px;
border-radius:10px;
transition:opacity .3s;
}

.controls.hide{
opacity:0;
pointer-events:none;
}

.controls button,
.controls select{
background:#111;
color:white;
border:1px solid #444;
padding:6px 10px;
cursor:pointer;
border-radius:5px;
}

/* Responsive */

@media(max-width:768px){

video{
height:40vh;
}

.controls{
bottom:10px;
gap:5px;
}

.controls button,
.controls select{
padding:5px 7px;
font-size:12px;
}

}

.header{
display:flex;
gap:10px;
padding:10px;
background:#111;
}

.btn{
padding:8px 12px;
background:#222;
border-radius:5px;
cursor:pointer;
}

#playlist{
padding:10px;
}

.item{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.item:hover{
background:#222;
}

</style>

</head>

<body>

<div class="video-container" id="videoContainer">

<video id="video"></video>

<div class="controls" id="controls">

<button onclick="rewind()">⏪ 10s</button>
<button onclick="forward()">⏩ 10s</button>

<select onchange="changeSpeed(this.value)">
<option value="0.5">0.5x</option>
<option value="1" selected>1x</option>
<option value="1.5">1.5x</option>
<option value="2">2x</option>
</select>

<select onchange="changeQuality(this.value)">
<option value="720">720p</option>
<option value="480">480p</option>
<option value="360">360p</option>
<option value="240">240p</option>
</select>

</div>

</div>

<div class="header">
<div class="btn" onclick="loadList('videos')">Videos</div>
<div class="btn" onclick="loadList('arithmetic')">Arithmetic</div>
</div>

<div id="playlist"></div>

<script>

const video = document.getElementById('video');
const playlist = document.getElementById('playlist');
const controls = document.getElementById('controls');
const videoContainer = document.getElementById('videoContainer');

let currentHls;
let hideTimeout;

function proxy(url){
return "https://ultimate-player.vicky2official1-90.workers.dev/proxy?url=" + encodeURIComponent(url);
}

function loadList(type){

playlist.innerHTML="Loading...";

let url="";

if(type==="videos"){
url="https://ultimate-player.vicky2official1-90.workers.dev/videos.txt";
}

if(type==="arithmetic"){
url="https://ultimate-player.vicky2official1-90.workers.dev/arithmetic.txt";
}

fetch(url)
.then(res => res.text())
.then(data => {

playlist.innerHTML="";

const lines=data.split('\n');

lines.forEach(line=>{

if(line.includes("http")){

const parts=line.split(":");
const title=parts[0];
const videoUrl=parts.slice(1).join(":").trim();

const div=document.createElement("div");
div.className="item";
div.textContent=title;

div.onclick=()=>{
playVideo(proxy(videoUrl));
};

playlist.appendChild(div);

}

});

});

}

function playVideo(url){

if(currentHls){
currentHls.destroy();
}

if(Hls.isSupported()){
currentHls=new Hls();
currentHls.loadSource(url);
currentHls.attachMedia(video);
video.play();
}else{
video.src=url;
video.play();
}

}

function rewind(){
video.currentTime -= 10;
}

function forward(){
video.currentTime += 10;
}

function changeSpeed(speed){
video.playbackRate = speed;
}

function changeQuality(q){
if(currentHls){
const levels = currentHls.levels;
levels.forEach((level,index)=>{
if(level.height == q){
currentHls.currentLevel = index;
}
});
}
}

/* Auto hide controls */

function showControls(){
controls.classList.remove("hide");

clearTimeout(hideTimeout);

hideTimeout=setTimeout(()=>{
controls.classList.add("hide");
},3000);
}

videoContainer.addEventListener("mousemove",showControls);
videoContainer.addEventListener("touchstart",showControls);

showControls();

loadList("videos");

</script>

</body>
</html>
